[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "miscope"
version = "0.1.0"
description = "MIScope — a mechanistic interpretability instrument for observing training dynamics"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "ipykernel>=7.1.0",
    "kaleido>=0.2.1",
    "nbformat>=5.10.4",
    "numpy>=1.26",
    "Pillow>=10.0",
    "plotly>=6.5.2",
    "scikit-learn>=1.8.0",
    "transformer-lens>=2.17.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.2",
]

[tool.hatch.build.targets.wheel]
packages = ["src/miscope"]
